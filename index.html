<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do-list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            display: flex;
            justify-content: center;
            background-color: antiquewhite;
            min-height: 100vh;
            padding-top: 50px;
        }

        button {
            cursor: pointer;
            width: 100px;
            height: 40px;

        }

        input {
            width: 200px;
            height: 100px;
            text-align: left;
            font-size: 16px;
            padding: 0 10px;
        }

        .input-box {
            display: flex;
            gap: 25px;
            margin: 10px 0;
        }

        .todo-list {
            list-style: none;
            margin: 20px 0;
        }


        h1 {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="todo-container">
        <h1>待办清单</h1>

        <div class="input-box">
            <input type="text" id="todo-input" placeholder="请输入任务内容...">
            <button class="add-btn" onclick="addTodo()">添加</button>
        </div>
        <ul class="todo-list" id="todo-list"></ul>

        <div class="clear-box">
            <button class="clear-btn" onclick="clearAll()">清空所有任务</button>
        </div>
    </div>
    <script>
        const todoinput = document.getElementById("todo-input")
        const todolist = document.getElementById("todo-list")

        todoinput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addTodo()
            }
        })
        function addTodo() {
            const task = todoinput.value.trim();
            if (task === '') return
            const li = document.createElement("li")
            li.innerText = task
            li.innerHTML = `
        <span class="task-text">${task}</span>
        <button class="del-btn" onclick="deleteTask(this)">删除</button>`

            todolist.appendChild(li)
            todoinput.value = ''
        }
        function clearAll() {
            todolist.innerHTML = ''
        }
        function deleteTask(btn) {
            const li = btn.parentElement;
            li.remove()
        }

    </script>
</body>

</html>
