<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do-list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            display: flex;
            justify-content: center;
            background-color: #eeeeee;
            min-height: 100vh;
            padding-top: 50px;
        }
        .todo-container{
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin: 0 auto;
        }
        button {
            cursor: pointer;
            width: 100px;
            height: 40px;
            border-radius: 10px;
            background: #6c757d;
            color: #FFF6F6;
            border: 1px solid #dee2e6;
            transition: all 0.3s ease-in-out;
            box-shadow: 4px 2px 3px rgba(0,0,0,0.1);
            &:hover{
                background: #dee2e6;
                background-color: #ced4da;
                box-shadow: 4px 4px 6px rgba(0,0,0,0.1);
                transform: translateY(-2px);
            }
        }

        input {
            width: 250px;
            height: 40px;
            text-align: left;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
            padding: 0 10px;
        }

        .input-box {
            display: flex;
            gap: 25px;
            margin: 10px 0;
        }

        .todo-list {
            list-style: none;
            margin: 20px 0;
        }
        .todo-list li{
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            padding: 10px;
            margin-bottom: 10px;
            background: #6c757d;
            color:white;

            border-radius: 10px;
            background: #6c757d;
        }
        .task-text{
            flex: 1;
            margin-right: 10px;
            word-break: break-all;
        }
        h1 {
            text-align: center;
        }
        .clear-btn{
            background: #dc3545;
            width: auto;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div class="todo-container">
        <h1>待办清单</h1>

        <div class="input-box">
            <input type="text" id="todo-input" placeholder="请输入任务内容...">
            <button class="add-btn" onclick="addTodo()">添加</button>
            <button class="clear-btn" onclick="clearAll()">清空所有任务</button>

        </div>

        <ul class="todo-list" id="todo-list"></ul>

    </div>
    <script>
        const todoinput = document.getElementById("todo-input")
        const todolist = document.getElementById("todo-list")

        todoinput.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addTodo()
            }
        })
        function addTodo() {
            const task = todoinput.value.trim();
            if (task === '') return
            const li = document.createElement("li")
            li.innerText = task
            li.innerHTML = `
        <span class="task-text">${task}</span>
        <button class="del-btn" onclick="deleteTask(this)">删除</button>`

            todolist.appendChild(li)
            todoinput.value = ''
        }
        function clearAll() {
            todolist.innerHTML = ''
        }
        function deleteTask(btn) {
            const li = btn.parentElement;
            li.remove()
        }

    </script>
</body>

</html>
